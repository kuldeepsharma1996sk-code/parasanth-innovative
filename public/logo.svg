<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Motion Lines (Top Graphic) -->
  <g stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
    <!-- Line 1 (Top) -->
    <path d="M 280 60 L 150 110 L 290 85" fill="none" stroke-width="12" />
    <!-- Line 2 -->
    <path d="M 290 85 L 140 135 L 300 110" fill="none" stroke-width="12" />
    <!-- Line 3 -->
    <path d="M 300 110 L 130 160 L 280 145" fill="none" stroke-width="12" />
  </g>

  <!-- PSI Bold Text -->
  <text x="200" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="110" fill="#1a1a1a" text-anchor="middle" letter-spacing="-3">PSI</text>
  
  <!-- PARASANTH -->
  <text x="200" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="32" fill="#333333" text-anchor="middle" letter-spacing="3">PARASANTH</text>
  
  <!-- INNOVATIVE INDUSTRIES -->
  <text x="200" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="14" fill="#666666" text-anchor="middle" letter-spacing="2">INNOVATIVE INDUSTRIES</text>
</svg>
